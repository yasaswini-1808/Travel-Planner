version: "3.8"

services:
  mongodb:
    image: mongo:7.0-alpine
    container_name: travel-assistant-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-travel123}
      MONGO_INITDB_DATABASE: travel_assistant
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - travel-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travel-assistant-app
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      MONGODB_URI: mongodb://admin:${MONGO_PASSWORD:-travel123}@mongodb:27017/travel_assistant?authSource=admin
      PORT: 5000
      GROQ_API_KEY: ${GROQ_API_KEY}
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      UNSPLASH_API_KEY: ${UNSPLASH_API_KEY}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - travel-network
    healthcheck:
      test: curl -f http://localhost:5000 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  travel-network:
    driver: bridge
